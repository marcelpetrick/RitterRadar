# RitterRadar — Source Configuration
# ===================================
# Add or remove sources here without changing application code.
# Restart the app (or POST /api/crawl/trigger) to pick up changes.
#
# Fields:
#   name:                  Human-readable identifier (must be unique)
#   url:                   Base URL that the adapter will scrape
#   adapter:               Adapter name registered in the crawler registry
#   enabled:               Set to false to skip this source
#   crawl_interval_hours:  Minimum hours between re-crawls (default: 24)

sources:
  # ── ACTIVE SOURCES (verified working 2026-06-25) ──────────────────────

  # 800+ events per year. Table at /mittelalterfeste-{YEAR}-nach-datum.php.
  # Columns: start date | end date | event name (button) | PLZ | city.
  - name: "Mittelalterkalender.info"
    url: "https://www.mittelalterkalender.info"
    adapter: "mittelalterkalender_info"
    enabled: true
    crawl_interval_hours: 24

  # 287 German events for 2026 (526 including all countries).
  # Paginated list at /marktkalender/?ansicht=liste&land=Deutschland&jahr=YEAR.
  # Columns: date | event name | PLZ + city | event type.
  - name: "Vehi Mercatus Marktkalender"
    url: "https://vehi-mercatus.de/marktkalender/"
    adapter: "vehi_mercatus"
    enabled: true
    crawl_interval_hours: 24

  # MPS — Mittelalterlich Phantasie Spectaculum.
  # ~9 major events per year. Scraped from homepage nav (not /termine which returns 403).
  - name: "Spectaculum.de"
    url: "https://www.spectaculum.de"
    adapter: "spectaculum"
    enabled: true
    crawl_interval_hours: 24

  # Pfalzis Marktkalendarium — classic hand-curated calendar (since 2000+).
  # 334 rows for 2026, 301 in Germany (D-). URL: /maerkte{YEAR}.php.
  # Cols: start | end | name | "D-XXXXX City" | venue | website | contact.
  - name: "Pfalzis Marktkalendarium"
    url: "https://marktkalendarium.de"
    adapter: "marktkalendarium"
    enabled: true
    crawl_interval_hours: 24

  # Mittelaltermarkt.online — WordPress + The Events Calendar REST API.
  # 531 events for 2026-2027 with pre-geocoded lat/lon from venue object.
  # Uses /wp-json/tribe/events/v1/events?status=publish, paginated JSON.
  - name: "Mittelaltermarkt.online"
    url: "https://mittelaltermarkt.online"
    adapter: "mittelaltermarkt_online"
    enabled: true
    crawl_interval_hours: 24

  # ── DISABLED — investigate before re-enabling ─────────────────────────

  # mittelalterfeste.de — domain expired, now parked on Sedo (sedo.com).
  # Redirect: GET /termine → 303 → sedo.com/search/details/?domain=…
  - name: "Mittelalterfeste.de"
    url: "https://www.mittelalterfeste.de/termine"
    adapter: "mittelalterfeste"
    enabled: false

  # schwerttanz.de — Schwerttanz Traunstein (folk dance club, not a market
  # calendar). TLS cert issued for "hypenat-casa-25.netboot.nethost.cz".
  - name: "Schwerttanz Marktkalender"
    url: "https://www.schwerttanz.de/marktkalender"
    adapter: "schwerttanz"
    enabled: false

  # ritterschaft.de — domain resolves to unrelated droids.de host content.
  # TLS cert issued for "mx01.droids.de".
  - name: "Ritterschaft.de"
    url: "https://www.ritterschaft.de/termine"
    adapter: "ritterschaft"
    enabled: false

  # mittelaltermarkt.com — domain listed for sale (JS spinner, no content).
  - name: "Mittelaltermarkt.com"
    url: "https://www.mittelaltermarkt.com/marktkalender"
    adapter: "mittelaltermarkt"
    enabled: false

# --- Add your own sources below ---
# To add a new source:
#   1. Copy one of the active entries above.
#   2. Set a unique name, url, and the adapter name.
#   3. If no dedicated adapter exists, use "generic_table".
#   4. Restart the app or POST /api/crawl/trigger.
