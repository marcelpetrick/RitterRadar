<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}RitterRadar{% endblock %}</title>

  <!-- Leaflet CSS (served locally — no external CDN dependency) -->
  <link rel="stylesheet" href="/static/vendor/leaflet.css" />

  <!-- Google Fonts: medieval-inspired headings + readable body -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet" />

  <!-- Application styles -->
  <link rel="stylesheet" href="/static/css/ritterradar.css" />

  {% block head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}

  <!-- Leaflet JS (served locally — no external CDN dependency) -->
  <script src="/static/vendor/leaflet.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
